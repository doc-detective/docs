# yaml-language-server: $schema=https://schema.buildwithfern.dev/docs-yml.json

############
# Basic info
############

instances:
  - url: doc-detective.docs.buildwithfern.com # {yourorg}.docs.buildwithfern.com
    # custom-domain: doc-detective.com # custom domain for live site

title: Doc Detective

ai-search:
  location:
    - docs

##########
# Branding
##########

logo:
  href: https://doc-detective.docs.buildwithfern.com
  dark: assets/logo/logo.svg
  light: assets/logo/logo.svg
  height: 40

colors:
  accentPrimary:
    dark: "#3EB16E"
    light: "#22623D"
  background:
    light: "#ffffff"
    dark: "#0d0e11"

favicon: assets/logo/favicon.ico

